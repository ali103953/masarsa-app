workflows:
  ios-testflight:
    name: MASARSA Flutter iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - apple
      vars:
        BUNDLE_ID: online.masarsa.app
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Recreate clean iOS project for CI
        script: |
          rm -rf ios
          flutter create --platforms=ios --org online.masarsa .
          rm -rf test
          flutter pub get

      - name: Configure iOS bundle identifier
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName مسارسا" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleName MASARSA" ios/Runner/Info.plist
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Run Flutter analysis
        script: |
          flutter analyze lib pubspec.yaml

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Build IPA
        script: |
          BUILD_NUMBER="${BUILD_NUMBER:-3}"

          flutter build ipa --release \
            --build-name=1.0.1 \
            --build-number="$BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "Uploading $IPA_PATH to TestFlight"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --username "tlana20232023@gmail.com" \
            --password "$APP_SPECIFIC_PASSWORD"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - flutter_drive.log
