workflows:
  ios-testflight:
    name: iOS TestFlight Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.masarsa.executiveenglishksa"
        APP_STORE_APPLE_ID: ""
    scripts:
      - name: Flutter packages
        script: |
          flutter pub get
      - name: Create iOS project if needed
        script: |
          if [ ! -f "ios/Runner.xcodeproj/project.pbxproj" ]; then
            flutter create .
          fi
      - name: Build iOS release
        script: |
          flutter build ipa --release --build-name=1.0.0 --build-number=1
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
