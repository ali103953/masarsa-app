workflows:
  ios-testflight:
    name: MASARSA iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      cocoapods: default
      node: 18
      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.masarsa.app
    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Copy capacitor config
        script: |
          cp capacitor.config.json ios/App/App/capacitor.config.json

      - name: Sync Capacitor
        script: |
          npx cap sync ios --inline

      - name: Apply Provisioning Profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - "**/*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
