workflows:
  ios-testflight:
    name: MASARSA iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.masarsa.app

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Create iOS project
        script: |
          flutter create .

      - name: Set Bundle Identifier
        script: |
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = online.masarsa.app;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Apply Provisioning Profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
