workflows:
  ios-testflight:
    name: MASARSA iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default
      node: 18
      groups:
        - apple

      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.masarsa.app

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Add iOS platform
        script: |
          npx cap add ios || true

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Apply Provisioning Profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"

    publishing:
      app_store_connect:
        apple_id: alyamiali-@hotmail.com
        password: $APP_SPECIFIC_PASSWORD
