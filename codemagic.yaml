workflows:
  ios-testflight:
    name: MASARSA Flutter iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - apple

      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.masarsa.app

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: alyamiali-@hotmail.com
        password: $APP_SPECIFIC_PASSWORD
