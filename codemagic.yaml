workflows:
  ios-testflight:
    name: MASARSA Flutter iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      groups:
        - apple

      ios_signing:
        distribution_type: app_store
        bundle_identifier: online.masarsa.app

    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Recreate iOS project
        script: |
          rm -rf ios
          flutter create --platforms=ios .
          flutter pub get

      - name: Set Bundle ID
        script: |
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = online.masarsa.app;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find build -name "*.ipa" | head -n 1)
          echo "IPA_PATH=$IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --username "tlana20232023@gmail.com" \
            --password "$APP_SPECIFIC_PASSWORD"

    artifacts:
      - "**/*.ipa"
